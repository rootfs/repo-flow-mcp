name: ci
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: run train
        run: |
          bash scripts/train.sh
  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: publish artifact
        run: |
          python scripts/publish.py --input dist/app.tar.gz
